<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF 合并工具</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.js"></script>
  <script>
    // 引入 PDFName 用于深度清理受损的 PDF 结构
    const { PDFDocument, PDFName } = PDFLib;
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 800px;
      width: 100%;
      padding: 40px;
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .drop-zone {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 50px 20px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
      background: #f8f9ff;
    }

    .drop-zone.dragover {
      background: #e8ebff;
      border-color: #764ba2;
      transform: scale(1.02);
    }

    .drop-zone p {
      color: #666;
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .drop-zone .icon {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    .file-list {
      margin-top: 25px;
      max-height: 300px;
      overflow-y: auto;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 15px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 8px;
      transition: background 0.2s;
    }

    .file-item:hover {
      background: #e8e8e8;
    }

    .file-item .name {
      flex: 1;
      color: #333;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item .size {
      color: #888;
      font-size: 0.85rem;
      margin: 0 15px;
      min-width: 60px;
      text-align: right;
    }

    .file-item .remove {
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .file-item .remove:hover {
      background: #ff3838;
    }

    .settings {
      margin-top: 25px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .settings label {
      color: #333;
      font-weight: 500;
    }

    .settings input[type="number"] {
      width: 80px;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
    }

    .settings input[type="number"]:focus {
      outline: none;
      border-color: #667eea;
    }

    .merge-btn {
      width: 100%;
      padding: 15px;
      margin-top: 25px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .merge-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .merge-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .results {
      margin-top: 25px;
    }

    .hidden {
      display: none;
    }

    .progress {
      margin-top: 15px;
      text-align: center;
      color: #667eea;
      font-weight: 500;
    }
    
    .error-msg {
      color: #ff4757;
      margin-top: 15px;
      text-align: center;
      font-weight: 500;
      word-break: break-all;
    }
    
    .skipped-notice {
      margin-top: 15px;
      padding: 15px;
      background: #fff3f3;
      border-left: 4px solid #ff4757;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #d63031;
    }

    .skipped-notice ul {
      margin-left: 20px;
      margin-top: 5px;
    }

    .skipped-notice li {
      margin-bottom: 3px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>PDF 合并工具</h1>
    
    <div class="drop-zone" id="dropZone">
      <div class="icon">📄</div>
      <p>拖拽 PDF 文件到此处</p>
      <p style="font-size: 0.9rem; color: #999;">或点击选择文件</p>
      <input type="file" id="fileInput" accept=".pdf" multiple style="display: none;">
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="settings">
      <label for="outputCount">合并后分配的 PDF 数量:</label>
      <input type="number" id="outputCount" value="1" min="1" max="100">
    </div>

    <button class="merge-btn" id="mergeBtn" disabled>开始合并</button>

    <div class="progress hidden" id="progress"></div>
    <div class="error-msg hidden" id="errorMsg"></div>

    <div class="results hidden" id="results"></div>
  </div>

  <script>
    let uploadedFiles = [];

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const mergeBtn = document.getElementById('mergeBtn');
    const outputCount = document.getElementById('outputCount');
    const progress = document.getElementById('progress');
    const errorMsg = document.getElementById('errorMsg');
    const results = document.getElementById('results');

    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
      fileInput.value = '';
    });

    async function readFileAsBytes(file) {
      const buffer = await file.arrayBuffer();
      return new Uint8Array(buffer);
    }

    async function mergePdfBytes(pdfFiles) {
      const mergedPdf = await PDFDocument.create();
      const skippedFiles = [];
      
      for (const fileData of pdfFiles) {
        let pdf;
        try {
          // 尝试加载 PDF
          pdf = await PDFDocument.load(fileData.bytes);
        } catch (err) {
          // 自动跳过加密保护或损坏的文件
          if (err.message.toLowerCase().includes('encrypted')) {
            console.warn(`文件 "${fileData.name}" 已加密保护，已自动跳过。`);
            skippedFiles.push({ name: fileData.name, reason: '已加密保护' });
          } else {
            console.warn(`文件 "${fileData.name}" 读取失败，已自动跳过:`, err.message);
            skippedFiles.push({ name: fileData.name, reason: '文件损坏或格式不支持' });
          }
          continue; // 跳过此文件，处理下一个
        }
        
        const pageIndices = pdf.getPageIndices();
        if (pageIndices.length === 0) continue;
        
        try {
          const copiedPages = await mergedPdf.copyPages(pdf, pageIndices);
          copiedPages.forEach((page) => mergedPdf.addPage(page));
        } catch (err) {
          console.warn(`[${fileData.name}] 正常复制抛出字典错误，尝试启动 PDF 结构净化并重试:`, err.message);
          
          try {
            pdf.catalog.delete(PDFName.of('AcroForm'));
            pdf.catalog.delete(PDFName.of('Outlines'));

            const pages = pdf.getPages();
            pages.forEach(p => {
              if (p.node.has(PDFName.of('Annots'))) {
                p.node.delete(PDFName.of('Annots'));
              }
            });

            const cleanBytes = await pdf.save();
            const cleanPdf = await PDFDocument.load(cleanBytes);
            
            const cleanCopiedPages = await mergedPdf.copyPages(cleanPdf, cleanPdf.getPageIndices());
            cleanCopiedPages.forEach((page) => mergedPdf.addPage(page));
            
            console.log(`[${fileData.name}] PDF 净化并重试成功！`);
          } catch (fallbackErr) {
            // 如果净化后依然失败，记录并跳过
            console.warn(`无法合并 "${fileData.name}"。该 PDF 内部结构严重损坏，已自动跳过。`);
            skippedFiles.push({ name: fileData.name, reason: '内部结构严重损坏' });
            continue;
          }
        }
      }
      
      const pageCount = mergedPdf.getPageCount();
      // 如果这组文件全被跳过了，直接返回 null
      if (pageCount === 0) {
        return { bytes: null, pageCount: 0, skippedFiles };
      }

      const savedBytes = await mergedPdf.save();
      return {
        bytes: savedBytes,
        pageCount: pageCount,
        skippedFiles: skippedFiles
      };
    }

    function handleFiles(files) {
      for (const file of files) {
        if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
          uploadedFiles.push(file);
        }
      }
      renderFileList();
      updateMergeButton();
    }

    function renderFileList() {
      fileList.innerHTML = '';
      uploadedFiles.forEach((file, index) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.innerHTML = `
          <span class="name" title="${file.name}">${file.name}</span>
          <span class="size">${formatSize(file.size)}</span>
          <button class="remove" data-index="${index}" title="移除">×</button>
        `;
        fileList.appendChild(item);
      });

      fileList.querySelectorAll('.remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          uploadedFiles.splice(parseInt(btn.dataset.index), 1);
          renderFileList();
          updateMergeButton();
        });
      });
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function updateMergeButton() {
      mergeBtn.disabled = uploadedFiles.length === 0;
      outputCount.max = Math.max(1, uploadedFiles.length);
    }

    mergeBtn.addEventListener('click', async () => {
      let count = parseInt(outputCount.value) || 1;
      count = Math.min(count, uploadedFiles.length);
      
      if (count < 1) return;

      mergeBtn.disabled = true;
      progress.classList.remove('hidden');
      errorMsg.classList.add('hidden');
      results.classList.add('hidden');
      results.innerHTML = '';

      try {
        progress.textContent = '正在读取 PDF 文件...';
        
        const pdfBytes = [];
        for (const file of uploadedFiles) {
          const bytes = await readFileAsBytes(file);
          pdfBytes.push({
            name: file.name,
            size: file.size,
            bytes: bytes
          });
        }

        progress.textContent = `正在平衡分配到 ${count} 个 PDF 组...`;
        
        const groups = distributeFiles(pdfBytes, count);

        const mergedPdfs = [];
        const allSkippedFiles = []; // 汇总所有被跳过的文件

        for (let i = 0; i < groups.length; i++) {
          progress.textContent = `正在合并第 ${i + 1}/${groups.length} 个 PDF...`;
          
          const mergeResult = await mergePdfBytes(groups[i]);
          
          if (mergeResult.skippedFiles.length > 0) {
            allSkippedFiles.push(...mergeResult.skippedFiles);
          }

          // 只有当有实际页面合并成功时才进行下载
          if (mergeResult.pageCount > 0 && mergeResult.bytes) {
            mergedPdfs.push({
              name: `merged_part_${i + 1}.pdf`,
              size: mergeResult.bytes.byteLength,
              pages: mergeResult.pageCount,
              bytes: mergeResult.bytes
            });
          }
        }

        progress.textContent = '合并处理完成，准备下载...';

        mergedPdfs.forEach((pdf, index) => {
          setTimeout(() => {
            const blob = new Blob([pdf.bytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = pdf.name;
            a.click();
            URL.revokeObjectURL(url);
          }, index * 500); 
        });

        progress.classList.add('hidden');
        results.classList.remove('hidden');

        // 生成最终的成功与跳过提示
        let resultHtml = '';
        if (mergedPdfs.length > 0) {
          resultHtml += `<p style="text-align: center; color: #2ed573; font-weight: 600; font-size: 1.1rem;">已成功生成并自动下载 ${mergedPdfs.length} 个 PDF 文件！</p>`;
        } else {
          resultHtml += `<p style="text-align: center; color: #ff9f43; font-weight: 600; font-size: 1.1rem;">所有文件均被跳过，没有生成任何合并文件。</p>`;
        }

        if (allSkippedFiles.length > 0) {
          const skippedList = allSkippedFiles.map(f => `<li><strong>${f.name}</strong> (${f.reason})</li>`).join('');
          resultHtml += `
            <div class="skipped-notice">
              <p style="font-weight: bold;">⚠️ 以下文件因出错已自动跳过：</p>
              <ul>${skippedList}</ul>
            </div>
          `;
        }

        results.innerHTML = resultHtml;

      } catch (error) {
        progress.classList.add('hidden');
        errorMsg.classList.remove('hidden');
        errorMsg.textContent = '程序发生未知错误: ' + error.message;
        console.error(error);
      }

      mergeBtn.disabled = false;
    });

    // 贪心算法：尽可能让各组的总体积均衡
    function distributeFiles(pdfData, groupCount) {
      if (groupCount === 1) {
        return [pdfData];
      }

      const sorted = [...pdfData].sort((a, b) => b.size - a.size);
      const groups = Array.from({ length: groupCount }, () => []);
      const groupSizes = new Array(groupCount).fill(0);

      for (const pdf of sorted) {
        let minIndex = 0;
        for (let i = 1; i < groupCount; i++) {
          if (groupSizes[i] < groupSizes[minIndex]) {
            minIndex = i;
          }
        }
        groups[minIndex].push(pdf);
        groupSizes[minIndex] += pdf.size;
      }

      return groups.filter(g => g.length > 0);
    }
  </script>
</body>
</html>
